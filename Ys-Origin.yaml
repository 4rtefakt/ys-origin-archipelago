# Ys Origin — Archipelago player settings template.
# Edit "name" and the options, then drop this file in Archipelago's Players/ folder.
# (You can have several players/yamls in one multiworld.)

name: Player1            # your slot name — must match `slot=` in yso_ap.cfg
description: Ys Origin
game: Ys Origin
requires:
  version: 0.4.0

Ys Origin:
  # --- who you play as (the seed is built for this character) ---
  character: hugo        # yunica | hugo | toal

  # --- what wins the seed ---
  goal: defeat_darm      # defeat_darm | defeat_all_bosses

  # --- which things count as checks (more checks = more to find) ---
  statue_checks: true    # activating goddess statues
  blessing_checks: true  # buying divine blessings
  boss_checks: true      # reaching each boss arena
  floor_checks: true     # reaching each floor
  room_checks: false     # entering each room (adds ~145 filler checks — big!)

  # --- goddess statue warp locks ---
  statue_warp_locks: false # when on, every goddess statue starts locked (dark:
                           #   no warp/heal/save) until you receive its unlock
                           #   item; one statue is unlocked from the start so you
                           #   can always save. Adds 21 "Statue Warp" items.
  random_start: false      # START ANYWHERE. With the above on, New Game spawns
                           #   you at a RANDOM statue: the mod skips the whole
                           #   intro (movies + cutscenes, every character) and
                           #   warps you there geared for the floor (level +
                           #   weapon). Beatable from any spawn. Normal seeds
                           #   are unaffected.
  max_starting_floor: 10   # cap the random-start spawn to statues on floor <= this
                           #   (1-25). Keeps New Game off the brutal deep floors (a
                           #   25F start with no gear behind you); lower = gentler
                           #   openings, raise for more variety. random_start only.
  max_warp_floors_skip: 5  # how many floors ahead of your current reach a warp may
                           #   jump (0 = unlimited). With N>0 a statue's warp only
                           #   enters logic once you can reach a floor within N of it,
                           #   so one lucky unlock can't fling you 15 floors up into
                           #   rooms you're not ready for. On foot everything still
                           #   stays reachable; this only paces warps. random_start only.

  # --- New Game starting loadout (applied as a floor: only ever raises) ---
  starting_items:        # items to begin every New Game owning. Defaults to the
    - Crystal            #   warp Crystals the intro normally grants (Toal uses the
    - Dark Crystal       #   Dark Crystal) so a random_start — which skips the intro
                         #   — still has them. Add any exact item names; unknowns
                         #   are ignored. Leave empty ([]) to start with nothing.
  starting_level: 1      # minimum character level at New Game (1 = vanilla). Raise
                         #   for a gentler opening; stacks with level_scaling (you
                         #   get the higher of this and the floor's expected level).
  starting_weapon_level: 1 # minimum displayed weapon level 1-6 at New Game (1 =
                           #   vanilla starter). The mod still upgrades it via Cleria
                           #   Ore / floor-appropriate gear; this only sets the floor.

  # --- catch-up level scaling (so warping far ahead isn't a grind wall) ---
  level_scaling: both    # off | level_floor | exp_multiplier | both
                         #   level_floor    = entering a floor far above your
                         #                    level bumps you up to (floor - margin)
                         #   exp_multiplier = bonus EXP scaled by how under-level
                         #                    you are (1x when on level)
                         #   both (default) = bump most of the way, EXP boost the rest
  level_margin: 0        # levels under a floor's expected level the bump leaves you
                         #   (0 = right at the expected level; raise for challenge)
  exp_multiplier_max: 8  # cap for the catch-up EXP multiplier

  # --- gear ---
  progressive_armor: true # armor & boots become progressive: every gear chest
                          #   holds a "Progressive Armor"/"Progressive Boots";
                          #   receiving one grants your character's NEXT tier, so
                          #   pickups never skip ahead. Off = raw pieces shuffled
                          #   (you can find endgame armor first).

  # --- weapon gating (so warping far ahead isn't a 1-damage wall) ---
  weapon_requirements: true # gate each zone behind enough Cleria Ore that the
                            #   vanilla weapon level for that floor is obtainable
                            #   first. Cleria Ore becomes progression and upgrades
                            #   your weapon on pickup. Pairs with level_scaling.

  # --- multiworld extras ---
  death_link: false      # when on, you die when any other DeathLink player dies

  # --- standard Archipelago knobs (leave as-is if unsure) ---
  progression_balancing: 0
  accessibility: items
